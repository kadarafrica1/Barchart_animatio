name: Generate and Upload Bar Chart Race

on:
  schedule:
    # Wuxuu fuli doonaa Maalin kasta saacada 12:00 AM UTC (Waad bedeli kartaa)
    - cron: '0 0 * * *' 
  workflow_dispatch: # Button kuu ogolaanaya inaad gacanta ku bilowdo waqti kastoo aad doonto

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    # 1. Soo qaado code-ka khasnada ku jira
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Diyaarinta Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Ku rakib software-ka FFmpeg (kaas oo muhiim u ah samaynta video-ga)
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    # 4. Ku rakib maktabadaha Python
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 5. Orod Script-ka Python si loo sameeyo Video-ga
    - name: Generate Bar Chart Video
      run: python app.py

    # 6. U soo geli Video-ga YouTube
    - name: Upload to YouTube
      env:
        YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
        YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      run: python upload.py
