name: Generate and Upload Bar Chart Race

on:
  schedule:
    # Wuxuu ordi doonaa 2 maalmood ba mar saacadda 7:00 PM EAT (16:00 UTC)
    - cron: '0 16 */2 * *' 
  workflow_dispatch: # Button-ka gacanta laga kiciyo

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas bar_chart_race ffmpeg-python google-api-python-client google-auth-oauthlib google-auth-httplib2 requests

    - name: Generate Bar Chart Video
      run: python app.py

    - name: Upload to YouTube
      env:
        YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
        YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      run: python upload.py
